<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>安全密碼產生器</title>
    <style>
        :root { --primary: #4A90E2; --secondary: #f8f9fa; --dark: #333; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; background: #f0f2f5; }
        .card { background: white; padding: 25px; border-radius: 16px; box-shadow: 0 8px 30px rgba(0,0,0,0.1); width: 90%; max-width: 400px; }
        h2 { margin-top: 0; text-align: center; color: var(--dark); font-size: 1.5rem; }
        .setting-group { margin-bottom: 15px; }
        label { display: flex; align-items: center; cursor: pointer; padding: 8px 0; font-size: 15px; color: #555; }
        input[type="checkbox"] { width: 18px; height: 18px; margin-right: 12px; cursor: pointer; }
        input[type="number"] { width: 100%; padding: 12px; margin-top: 5px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 16px; }
        button { width: 100%; padding: 14px; background: var(--primary); color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 16px; font-weight: 600; margin-top: 15px; transition: 0.2s; }
        button:active { transform: scale(0.98); opacity: 0.9; }
        .copy-btn { background: #34c759; margin-top: 10px; }
        #result { margin-top: 20px; padding: 15px; background: var(--secondary); border: 2px dashed #cbd5e0; border-radius: 8px; word-break: break-all; font-family: 'Courier New', monospace; font-size: 1.3rem; text-align: center; color: #2d3748; min-height: 1.5rem; }
    </style>
</head>
<body>

<div class="card">
    <h2>🔐 密碼產生器</h2>
    
    <div class="setting-group">
        <label>密碼長度：<input type="number" id="length" value="16" min="4" max="64"></label>
    </div>

    <hr style="border: 0; border-top: 1px solid #eee; margin: 15px 0;">

    <div class="setting-group">
        <label><input type="checkbox" id="upper" checked> 包含大寫字母 (A-Z)</label>
        <label><input type="checkbox" id="lower" checked> 包含小寫字母 (a-z)</label>
        <label><input type="checkbox" id="number" checked> 包含數字 (0-9)</label>
        <label><input type="checkbox" id="symbol"> 包含特殊字元 (!@#$...)</label>
    </div>
    
    <button onclick="generate()">一鍵產生密碼</button>
    
    <div id="result">---</div>
    
    <button class="copy-btn" onclick="copyPassword()">複製密碼</button>
</div>

<script>
    function generate() {
        const length = parseInt(document.getElementById('length').value);
        const hasUpper = document.getElementById('upper').checked;
        const hasLower = document.getElementById('lower').checked;
        const hasNumber = document.getElementById('number').checked;
        const hasSymbol = document.getElementById('symbol').checked;

        const charSets = {
            upper: "ABCDEFGHIJKLMNOPQRSTUVWXYZ",
            lower: "abcdefghijklmnopqrstuvwxyz",
            number: "0123456789",
            symbol: "!@#$%^&*()_+~`|}{[]:;?><,./-="
        };

        let pool = "";
        if (hasUpper) pool += charSets.upper;
        if (hasLower) pool += charSets.lower;
        if (hasNumber) pool += charSets.number;
        if (hasSymbol) pool += charSets.symbol;

        if (pool === "") {
            alert("請至少選擇一種字元類型！");
            return;
        }

        let password = "";
        const array = new Uint32Array(length);
        window.crypto.getRandomValues(array);
        
        for (let i = 0; i < length; i++) {
            password += pool.charAt(array[i] % pool.length);
        }
        
        document.getElementById('result').innerText = password;
    }

    function copyPassword() {
        const text = document.getElementById('result').innerText;
        if(text === "---") return;
        navigator.clipboard.writeText(text).then(() => {
            const btn = document.querySelector('.copy-btn');
            const originalText = btn.innerText;
            btn.innerText = "✅ 已複製！";
            setTimeout(() => btn.innerText = originalText, 1500);
        });
    }
</script>

</body>
</html>
