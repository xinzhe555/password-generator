<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>離線密碼產生器</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; padding: 50px; background: #f4f4f9; }
        .card { background: white; padding: 2rem; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); width: 100%; max-width: 400px; }
        h2 { margin-top: 0; color: #333; }
        input[type="number"] { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: #007bff; color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 16px; margin-top: 10px; }
        button:hover { background: #0056b3; }
        #result { margin-top: 20px; padding: 15px; background: #e9ecef; border-radius: 6px; word-break: break-all; font-family: monospace; font-size: 1.2rem; text-align: center; min-height: 1.5rem; }
    </style>
</head>
<body>

<div class="card">
    <h2>🔐 隨機密碼產生器</h2>
    <label for="length">設定長度：</label>
    <input type="number" id="length" value="16" min="4" max="100">
    
    <button onclick="generate()">一鍵產生密碼</button>
    
    <div id="result">請點擊按鈕</div>
    <button onclick="copyPassword()" style="background: #28a745;">複製密碼</button>
</div>

<script>
    function generate() {
        const length = document.getElementById('length').value;
        const charset = "abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789!@#$%^&*()_+~`|}{[]:;?><,./-=";
        let retVal = "";
        
        // 使用更安全的 Web Crypto API
        const array = new Uint32Array(length);
        window.crypto.getRandomValues(array);
        
        for (let i = 0; i < length; ++i) {
            retVal += charset.charAt(array[i] % charset.length);
        }
        document.getElementById('result').innerText = retVal;
    }

    function copyPassword() {
        const text = document.getElementById('result').innerText;
        if(text === "請點擊按鈕") return;
        navigator.clipboard.writeText(text);
        alert("密碼已複製！");
    }
</script>

</body>
</html>
